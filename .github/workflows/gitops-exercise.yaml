name: Build and Push Images

on:
    push:
        branches: ["gitops-exercise"]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        steps:
            - uses: actions/checkout@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # SHA corto para los tags
            - name: Set Short SHA
              id: vars
              run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

            # --- API ---
            - name: Build and Push API
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./gitops-exercise/app-api/src/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/app-api:${{ steps.vars.outputs.sha_short }}
                      ghcr.io/${{ github.repository_owner }}/app-api:latest

            # --- Frontend ---
            - name: Build and Push Frontend
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./gitops-exercise/app-frontend/src/Dockerfile
                  push: true
                  tags: |
                      ghcr.io/${{ github.repository_owner }}/app-frontend:${{ steps.vars.outputs.sha_short }}
                      ghcr.io/${{ github.repository_owner }}/app-frontend:latest

            # --- Update values ---
            - name: Update values.yaml files
              run: |
                  SHORT_SHA=${{ steps.vars.outputs.sha_short }}
                  # Actualizamos el tag en ambos archivos
                  sed -i "s|tag:.*|tag: ${SHORT_SHA}|g" gitops-exercise/k8s/releases/values-api.yaml
                  sed -i "s|tag:.*|tag: ${SHORT_SHA}|g" gitops-exercise/k8s/releases/values-frontend.yaml

                  # Configuración de git para el commit automático
                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"

                  # Añadimos y hacemos commit solo si hubo cambios
                  git add gitops-exercise/k8s/releases/values-api.yaml gitops-exercise/k8s/releases/values-frontend.yaml
                  git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update image tags to ${SHORT_SHA}" && git push)
