name: Build and Push Images

on:
    push:
        branches: ["gitops-exercise"]

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: write
        steps:
            - uses: actions/checkout@v3
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Login to GitHub Container Registry
              uses: docker/login-action@v2
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            # --- API ---
            - name: Build and Push API
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./gitops-exercise/app-api/src/Dockerfile
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/app-api:latest

            # --- Frontend ---
            - name: Build and Push Frontend
              uses: docker/build-push-action@v4
              with:
                  context: .
                  file: ./gitops-exercise/app-frontend/src/Dockerfile
                  push: true
                  tags: ghcr.io/${{ github.repository_owner }}/app-frontend:latest

            # --- Update values ---
            - name: Update values.yaml files
              run: |
                  SHORT_SHA=$(git rev-parse --short HEAD)
                  sed -i "s|tag:.*|tag: ${SHORT_SHA}|g" gitops-exercise/k8s/releases/values-api.yaml
                  sed -i "s|tag:.*|tag: ${SHORT_SHA}|g" gitops-exercise/k8s/releases/values-frontend.yaml
                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"
                  git add gitops-exercise/k8s/releases/values-api.yaml gitops-exercise/k8s/releases/values-frontend.yaml
                  git commit -m "Update image tags to ${SHORT_SHA}"
                  git push
